name: Cinematic Multi-Agent Workflow CI (v3.5)

on:
  push:
    branches: [ main ]
    paths:
      - '**.md'
      - 'agents/**'
      - '.grok/skills/**'
      - 'references/**'
      - 'web_ui/**'
      - 'tools/**'
      - 'examples/**'
      - '.github/workflows/**'
      - 'requirements*.txt'
  pull_request:
    branches: [ main ]
    paths:
      - '**.md'
      - 'agents/**'
      - '.grok/skills/**'
      - 'references/**'
      - 'web_ui/**'
      - 'tools/**'
  workflow_dispatch:
    inputs:
      validation_mode:
        description: 'Validation level'
        required: false
        default: 'standard'
        type: choice
        options:
          - standard
          - strict
          - full

env:
  VALIDATION_MODE: ${{ github.event.inputs.validation_mode || 'standard' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Validation Tools
        run: |
          pip install pyyaml pyflakes --quiet

      # ============================================================
      # DYNAMIC AGENT & ROLE CARD VALIDATION
      # ============================================================
      - name: Dynamic Agent & Role Card Validation (v3.5)
        id: agent_check
        run: |
          echo "🔍 Grok Imagine Cinematic Studio v3.5 - Dynamic Validation"
          echo "========================================================"
          echo "Validation Mode: $VALIDATION_MODE"
          echo ""

          # Discover Role Cards dynamically
          if [ -d "references/agents" ]; then
            ROLE_CARDS=$(find references/agents -name "*.md" -type f | sort)
            ROLE_CARD_COUNT=$(echo "$ROLE_CARDS" | wc -l)
            echo "📋 Found $ROLE_CARD_COUNT Role Cards in references/agents/"
          else
            echo "❌ references/agents/ directory not found"
            ROLE_CARD_COUNT=0
            exit 1
          fi

          # Validate Role Card structure
          echo ""
          echo "🔎 Validating Role Card structure..."
          REQUIRED_SECTIONS=("Core Mission" "v3.5" "Key Responsibilities" "Decision Frameworks" "Activation Triggers")
          STRUCTURE_ISSUES=0

          for card in $ROLE_CARDS; do
            CARD_NAME=$(basename "$card" .md)
            MISSING_SECTIONS=0
            
            for section in "${REQUIRED_SECTIONS[@]}"; do
              if ! grep -q "$section" "$card" 2>/dev/null; then
                echo "⚠️  $CARD_NAME: Missing section '$section'"
                MISSING_SECTIONS=$((MISSING_SECTIONS+1))
              fi
            done
            
            if [ $MISSING_SECTIONS -gt 0 ]; then
              STRUCTURE_ISSUES=$((STRUCTURE_ISSUES+1))
            else
              echo "✅ $CARD_NAME: Structure OK"
            fi
          done

          # Version tag check across key directories
          echo ""
          echo "🔖 Checking version tags..."
          VERSION_ISSUES=0
          for dir in agents .grok/skills references/agents; do
            if [ -d "$dir" ]; then
              for f in $(find "$dir" -name "*.txt" -o -name "*.md" 2>/dev/null); do
                if ! grep -qE 'v3\.(4|5)' "$f" 2>/dev/null; then
                  echo "⚠️  $(basename "$f"): missing v3.4/v3.5 tag"
                  VERSION_ISSUES=$((VERSION_ISSUES+1))
                fi
              done
            fi
          done

          # Documentation validation
          echo ""
          echo "📈 Validating key documentation..."
          DOC_ISSUES=0
          for doc in README.md Quick_Start_Guide.md CHANGELOG.md; do
            if [ -f "$doc" ]; then
              if grep -q "22" "$doc" && grep -q "Role Card" "$doc"; then
                echo "✅ $doc: Mentions 22 agents + Role Cards"
              else
                echo "⚠️  $doc: May need update (missing 22 agents or Role Card references)"
                DOC_ISSUES=$((DOC_ISSUES+1))
              fi
            else
              echo "❌ Missing: $doc"
              DOC_ISSUES=$((DOC_ISSUES+1))
            fi
          done

          # Output variables
          echo "role_card_count=$ROLE_CARD_COUNT" >> $GITHUB_OUTPUT
          echo "structure_issues=$STRUCTURE_ISSUES" >> $GITHUB_OUTPUT
          echo "version_issues=$VERSION_ISSUES" >> $GITHUB_OUTPUT
          echo "doc_issues=$DOC_ISSUES" >> $GITHUB_OUTPUT

          # Decision logic
          FAIL=false
          if [ "$VALIDATION_MODE" = "strict" ]; then
            if [ $STRUCTURE_ISSUES -gt 0 ] || [ $VERSION_ISSUES -gt 5 ] || [ $DOC_ISSUES -gt 1 ]; then
              FAIL=true
            fi
          elif [ "$VALIDATION_MODE" = "full" ]; then
            if [ $STRUCTURE_ISSUES -gt 0 ] || [ $VERSION_ISSUES -gt 0 ] || [ $DOC_ISSUES -gt 0 ]; then
              FAIL=true
            fi
          else
            if [ $STRUCTURE_ISSUES -gt 3 ] || [ $VERSION_ISSUES -gt 10 ] || [ $DOC_ISSUES -gt 3 ]; then
              FAIL=true
            fi
          fi

          if $FAIL; then
            echo ""
            echo "❌ Validation failed (mode: $VALIDATION_MODE)"
            exit 1
          fi

          echo ""
          echo "✅ All validations passed"

      # ============================================================
      # CORE FILES & PYTHON CHECKS
      # ============================================================
      - name: Core Files & Python Validation
        run: |
          echo "📦 Checking core files and Python syntax..."

          REQUIRED_FILES=("MASTER_PROMPT_v3.5.md" "tools/cinematic_studio_cli.py" "web_ui/app.py")
          MISSING=0
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ MISSING: $file"
              MISSING=$((MISSING+1))
            fi
          done

          if [ $MISSING -gt 0 ]; then
            exit 1
          fi

          echo "🐍 Running Python syntax check..."
          python -m py_compile tools/cinematic_studio_cli.py web_ui/app.py
          echo "✅ Python files compile successfully"

      # ============================================================
      # SUMMARY
      # ============================================================
      - name: Generate CI Summary
        if: always()
        run: |
          echo "## 🎬 Cinematic CI v3.5 Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Role Card Structure | ✅ Validated |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ✅ Checked |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Syntax | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** \`${{ env.VALIDATION_MODE }}\`" >> $GITHUB_STEP_SUMMARY

      - name: PR Comment
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ## ✅ Cinematic Multi-Agent CI v3.5 Passed
            
            - Role Cards validated dynamically from `references/agents/`
            - Documentation checked for 22-agent + Role Card references
            - Python syntax clean
            - Mode: `${{ env.VALIDATION_MODE }}`
            
            Ready to merge.
          comment-tag: cinematic-ci-v35
          reactions: 'rocket'
